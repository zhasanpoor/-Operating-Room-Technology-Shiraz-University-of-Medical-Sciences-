<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | تکنولوژی اتاق عمل</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent:#6366f1; --accent2:#8b5cf6; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Vazirmatn',system-ui,sans-serif;
            background:radial-gradient(circle at 30% 20%,#12141e,#06060b);
            color:#e5e7eb; min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            text-align:center; padding:24px;
        }
        .box { max-width:460px; }
        .code {
            font-size:120px; font-weight:800; line-height:1;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            background-clip:text; margin-bottom:8px;
        }
        .emoji { font-size:52px; margin-bottom:16px; }
        h1 { font-size:24px; margin-bottom:12px; }
        p { color:#9ca3af; line-height:2; margin-bottom:28px; }
        .btn {
            display:inline-flex; align-items:center; gap:8px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:#fff; text-decoration:none; padding:14px 28px;
            border-radius:12px; font-weight:600; font-size:15px;
            transition:transform .2s, box-shadow .2s;
        }
        .btn:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(99,102,241,.4); }
    </style>
</head>
<body>
    <div class="box">
        <div class="emoji">🧭</div>
        <div class="code">۴۰۴</div>
        <h1>این صفحه رو پیدا نکردیم!</h1>
        <p>
            انگار آدرسی که دنبالش بودی وجود نداره یا جابه‌جا شده.
            نگران نباش، برگرد به صفحهٔ اصلی و از اونجا ادامه بده.
        </p>
        <a class="btn" href="/">🏠 بازگشت به صفحهٔ اصلی</a>
    </div>
</body>
</html>
